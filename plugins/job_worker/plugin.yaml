name: job_worker
version: 1.0.0
description: Long-running job processor that drains a mailbox work queue.
entrypoint: worker:run
runner: python
max_execution_time_seconds: 3600
required_capabilities:
  - memory.read
  - memory.write
  - state.read
  - state.write
  - message.send
  - tool.python
supported_events:
  - task.started
  - message.received
  - process.waiting
