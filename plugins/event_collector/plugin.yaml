name: event_collector
version: 1.0.0
description: Long-running event collector with episodic memory.
entrypoint: collector:run
runner: python
max_execution_time_seconds: 3600
required_capabilities:
  - memory.read
  - memory.write
  - state.read
  - state.write
  - message.send
supported_events:
  - memory.stored
  - message.received
  - process.waiting
