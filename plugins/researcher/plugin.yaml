name: researcher
version: 1.0.0
description: Gathers research via LLM with episodic memory and RAG.
entrypoint: researcher:run
runner: python
required_capabilities:
  - state.read
  - state.write
  - memory.read
  - memory.write
  - message.send
  - tool.llm
  - tool.python
supported_events:
  - tool.requested
  - tool.completed
  - memory.stored
  - memory.retrieved
