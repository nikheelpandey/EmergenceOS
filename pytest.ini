[pytest]
minversion = 8.0

testpaths =
    tests

python_files =
    test_*.py

python_classes =
    Test*

python_functions =
    test_*

addopts =
    -ra
    --strict-markers
    --strict-config
    --cov=emergence
    --cov-report=term-missing
    --cov-report=html
    --cov-branch

filterwarnings =
    error

markers =
    unit: Unit tests
    integration: Integration tests
    system: End-to-end system tests
    performance: Performance benchmarks
    invariant: Architectural invariant tests